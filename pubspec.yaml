# Arul. Android-only — no iOS/web/desktop targets exist and none should be added.
# Before bumping ANY package, fetch its pub.dev docs (CLAUDE.md §3).
#
# DELIBERATELY ABSENT (bloat/perf, decided 2026-07-14 — do not "helpfully" re-add):
#   google_fonts       — fetches fonts over HTTP at first launch (wrong font on frame
#                        one, broken offline, a gstatic privacy disclosure). The system
#                        stack already covers Latin + all 5 Indic scripts at zero bytes.
#   font_awesome_flutter — ships whole icon fonts; built-in `Icons` tree-shakes to only
#                        the glyphs referenced. Never build IconData() at runtime.
#   shimmer            — uses ShaderMask => saveLayer() (an offscreen pass PER FRAME).
#                        lib/app/widgets/skeleton.dart animates a gradient instead.
name: arul
description: "Arul — South Indian wallpapers"
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.2      # state; the only cross-layer glue
  go_router: ^17.3.0            # nav
  cached_network_image: ^3.4.1  # static wallpapers (decoded at display size)
  shared_preferences: ^2.5.5    # theme mode, locale
  http: ^1.2.0                  # CDN catalog fetches
  connectivity_plus: ^7.2.0     # offline gate — transport-level online/offline
  url_launcher: ^6.3.2          # support mail, privacy policy
  package_info_plus: ^10.2.0    # version row in Settings

  # ── Live wallpapers + apply (ported with the native Media3 pipeline).
  path_provider: ^2.1.5         # app-internal dirs for the applied live video
  flutter_cache_manager: ^3.4.1 # disk cache for prefetched MP4s (shared w/ CNI)
  share_plus: ^13.2.0           # share a wallpaper file

  # ── Phase 4 logic port (versions pinned to the reference app's pubspec).
  riverpod_annotation: ^4.0.3   # codegen'd providers (auth/analytics/premium/…)
  freezed_annotation: ^3.1.0    # models
  json_annotation: ^4.12.0
  flutter_secure_storage: ^10.3.1 # JWT pair + cached profile (ApiClient)
  google_sign_in: ^7.2.0        # v7 flow: instance → initialize → authenticate
  play_install_referrer: ^0.5.0 # referral attribution (Play Install Referrer)
  posthog_flutter: ^5.28.0      # product analytics — manual events only,
                                # autocapture/replay OFF (behind AnalyticsService)
  facebook_app_events: ^0.30.1  # Meta ★ conversion events only; OFF until
                                # META_APP_ID + META_CLIENT_TOKEN are real
  phonepe_payment_sdk: ^3.0.2   # premium — vendored override below (AGP fix)
  file_picker: ^12.0.0-beta.7   # upload-your-content (FileType.media pick)

  # ── Firebase (core/crashlytics/performance/analytics) DELIBERATELY ABSENT:
  # android/app/google-services.json does not exist yet (Google project
  # deferred). CrashReporter / PerformanceMonitor / AnalyticsService compile
  # against no-op implementations; to re-enable, add the four firebase_* deps
  # (versions in the reference pubspec), the google-services + crashlytics
  # gradle plugins, copy lib/core/crash/firebase_crash_reporter.dart +
  # lib/core/perf/firebase_performance_monitor.dart +
  # lib/core/analytics/google_analytics_service.dart from the reference, and
  # flip the guards in crash_provider / performance_provider /
  # analytics_provider / main.dart (marked "FIREBASE-REENABLE").

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.5
  json_serializable: ^6.14.0

# phonepe_payment_sdk 3.0.2 ships a Gradle file that calls
# getDefaultProguardFile('proguard-android.txt'), removed in AGP 9 — vendored in
# third_party/ with the one-line fix (see the reference app's pubspec note).
dependency_overrides:
  phonepe_payment_sdk:
    path: third_party/phonepe_payment_sdk

flutter:
  generate: true          # gen_l10n
  uses-material-design: true
  assets:
    - assets/images/
    # The splash / sign-in background clip. Bundled, not streamed: the first
    # screen must never wait on the network, and it is the same lotus clip the
    # entire brand palette was extracted from — 4.3 MB, 1024x1824 (w%128==0,
    # h%32==0, per the decoder constraint in docs/media-conventions.md).
    # Full-quality source swapped in 2026-07-14; the old 640x1152/1.1Mbps
    # encode read visibly soft full-bleed on 1080-wide screens.
    - assets/video/
  fonts:
    # Display serif — ONLY the Latin "Arul" wordmark, screen titles, and the
    # display numerals/headings the design README names. All other UI text
    # stays on the system stack (covers all 5 Indic scripts at zero bytes).
    - family: Marcellus
      fonts:
        - asset: assets/fonts/Marcellus-Regular.ttf

flutter_native_splash:
  color: "#14090C"        # == ArulColors.ink == values/colors.xml splash_bg. If these three ever
                          # disagree, the OS splash flashes a different black than
                          # the app paints, and the handoff visibly pops.
  color_dark: "#14090C"
  android_12:
    color: "#14090C"
    icon_background_color: "#14090C"
