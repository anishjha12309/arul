# HSR unified CMS — one Worker managing content for BOTH apps (Pakiza + Arul)
# from a single login. No crons: the per-app Workers own their hourly rebuild /
# sweep crons; this Worker only authors content and triggers rebuilds over HTTP.
name = "hsr-cms"
main = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]
account_id = "ba8dd87179e2ffd378a50292ca8e69e0"

# Keep the *.workers.dev subdomain alongside the zone routes.
workers_dev = true

# ─── Zone routes ──────────────────────────────────────────────────────────────
# /admin*            — the CMS (took the path over from the Pakiza worker's CMS)
# /payments/webhook* — PhonePe S2S dispatcher: PhonePe sends BOTH apps'
#                      callbacks to one URL; this Worker relays each event to
#                      ARUL_API ("DKS_" merchant ids) or PAKIZA_API (the rest).
routes = [
  { pattern = "api.hsrutility.com/admin*", zone_name = "hsrutility.com" },
  { pattern = "api.hsrutility.com/payments/webhook*", zone_name = "hsrutility.com" }
]

# ─── Hyperdrive (Neon Postgres, one per app — NEVER cross-wire these) ─────────
[[hyperdrive]]
binding = "HYPERDRIVE_PAKIZA"
id = "82a565ff7fb443cc9b761e5fcb5492b3"

[[hyperdrive]]
binding = "HYPERDRIVE_ARUL"
id = "19dda46cef1c42fc9d3176704feb74dc"

# ─── R2 buckets (one per app — the apps' hourly sweeps delete anything they
#     don't recognize, so sharing a bucket would destroy the other app's media) ──
[[r2_buckets]]
binding = "R2_PAKIZA"
bucket_name = "pakiza"

[[r2_buckets]]
binding = "R2_ARUL"
bucket_name = "south-indian-wallpapers"

# ─── Service bindings to the app Workers (rebuild trigger). Plain fetch() to a
#     sibling *.workers.dev host is blocked (same-zone worker-to-worker), so
#     triggerRebuild goes through these instead. ────────────────────────────────
[[services]]
binding = "ARUL_API"
service = "arul-api"

[[services]]
binding = "PAKIZA_API"
service = "pakiza-api"

# ─── Secrets (`npx wrangler secret put <NAME>`) ───────────────────────────────
# ADMIN_USERNAME  ADMIN_PASSWORD_HASH  ADMIN_SESSION_SECRET
# R2_ACCESS_KEY_ID  R2_SECRET_ACCESS_KEY  R2_ENDPOINT   (account-scoped token,
#   covers both buckets; per-app bucket NAMES come from src/registry.ts)
# ARUL_CATALOG_BUILD_SECRET  PAKIZA_CATALOG_BUILD_SECRET
