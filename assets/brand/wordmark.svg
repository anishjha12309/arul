<!-- Arul wordmark — the gopuram mark + ARUL. Mark geometry is the SAME as
     logo_mark.svg / lib/app/widgets/gopuram_mark.dart (design-handoff viewBox
     0 0 44 40), so the launcher icon, the in-app mark and this wordmark can
     never drift apart. Letterforms are outlined paths (no font dependency).
     Retint: change the two gradient stops below + the #wordmark fill. -->
<svg xmlns="http://www.w3.org/2000/svg" width="348" height="140" viewBox="0 0 348 140" role="img" aria-label="Arul">
  <defs>
    <linearGradient id="gopuramGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5C95C"/>
      <stop offset="1" stop-color="#E0A82E"/>
    </linearGradient>
  </defs>
  <!-- Mark: 44x40 source scaled 2.0x (88x80), centred in the 140-tall band. -->
  <g transform="translate(20,30) scale(2.0)">
    <path fill="url(#gopuramGold)" fill-rule="nonzero"
          d="M20 0h4v3h-4z M14 5h16l-2 5H16z M10 12h24l-2.5 6H12.5z M6 20h32l-3 7H9z M2 29h40l-2 8H4z"/>
  </g>
  <path id="wordmark" fill="#E0A82E" d="M161.68,44L165.32,44L148.68,96L141.92,96ZM161.68,44L165.32,44L185.08,96L178.32,96ZM147.9,80.4H179.1V86.64H147.9ZM197.82,44H204.06V96H197.82ZM204.06,44L218.62,44A13.52 13.52 0 0 1 218.62 71.04L204.06,71.04L204.06,64.8L218.62,64.8A7.28 7.28 0 0 0 218.62 50.24L204.06,50.24ZM215.5,68.96L222.26,68.96L234.22,96L227.46,96ZM246.7,44L246.7,76.76A19.24 19.24 0 0 0 285.18 76.76L285.18,44L278.94,44L278.94,76.76A13 13 0 0 1 252.94 76.76L252.94,44ZM297.66,44H303.9V89.76H329.9V96H297.66Z"/>
</svg>
