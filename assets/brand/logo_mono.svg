  <g transform="translate(29.8,32) scale(1.1)">
    <path id="gopuram" fill="#FFFFFF" fill-rule="nonzero"
          d="M20 0h4v3h-4z M14 5h16l-2 5H16z M10 12h24l-2.5 6H12.5z M6 20h32l-3 7H9z M2 29h40l-2 8H4z"/>
  </g>
</svg>
