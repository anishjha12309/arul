<!-- Arul monochrome mark — source for the Android 13+ themed/monochrome icon.
     Same gopuram geometry as logo_mark.svg, one flat fill: the five tiers are
     separate lobes with clear air between them, so flattening to a single
     colour still reads as a tower and never blobs. -->
