<!-- Arul brand mark — the gopuram (temple tower), the SAME geometry the app draws
     in-product via lib/app/widgets/gopuram_mark.dart (design-handoff viewBox
     0 0 44 40). Launcher icon and in-app mark must never disagree.
     Retint: change the two gradient stops below.
     Canvas 108x108 = Android adaptive-icon foreground. Centre (54,54).
     The source mark is scaled 1.1x and centred, so its half-diagonal is 32.7 —
     exactly the 66dp adaptive-icon safe circle. Do not scale up past 1.1 or an
     OEM mask can clip the base tier. -->
<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108" role="img" aria-label="Arul">
  <defs>
    <linearGradient id="gopuramGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5C95C"/>
      <stop offset="1" stop-color="#E0A82E"/>
    </linearGradient>
  </defs>
  <g transform="translate(29.8,32) scale(1.1)">
    <path id="gopuram" fill="url(#gopuramGold)" fill-rule="nonzero"
          d="M20 0h4v3h-4z M14 5h16l-2 5H16z M10 12h24l-2.5 6H12.5z M6 20h32l-3 7H9z M2 29h40l-2 8H4z"/>
  </g>
</svg>
