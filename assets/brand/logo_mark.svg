<!-- Arul brand mark — lotus + deepam flame.
     Retint: change the four gradient stops below. Geometry is two paths only:
       #lotus (the bloom + receptacle) and #flame (the rising deepam flame).
     Canvas 108x108 = Android adaptive-icon foreground. Centre (54,54).
     All ink sits inside r=32.7 of centre, i.e. within the 66dp safe circle.
     The bloom is nonzero-filled: every subpath winds the same way, so they union.
     Reversing any subpath's direction will punch holes in the fill. -->
